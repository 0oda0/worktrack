name: CI

# Тесты гоняются на каждый пуш в dev/main и на каждый PR — чтобы в main
# (ветку, которая деплоится) не попадал сломанный код.
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_call: # переиспользуется в deploy.yml как гейт перед выкаткой

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: worktrack
          POSTGRES_PASSWORD: worktrack
          POSTGRES_DB: worktrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U worktrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: worktrack
      DB_PASSWORD: worktrack
      DB_NAME: worktrack_test
      JWT_SECRET: ci-secret
      APP_TZ: Europe/Moscow
      ADMIN_EMAIL: admin@worktrack.ru
      ADMIN_PASSWORD: admin

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Установить зависимости
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Тесты
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Установить зависимости
        working-directory: frontend
        run: npm ci

      - name: Линт
        working-directory: frontend
        run: npm run lint

      - name: Сборка (включает проверку типов)
        working-directory: frontend
        run: npm run build
